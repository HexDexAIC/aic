# CheatCodeMJ tuning knobs — every parameter the policy reads at init.
#
# Loaded by record_episode.sh via `ros2 run aic_model aic_model
# --params-file <this path>`. Override individual values from the CLI
# with `-p name:=value` after --params-file (CLI wins over file).
#
# Sweeps and single-trial recordings share this default; copy + edit
# this file to A/B different policy settings without re-editing source.
#
# Units: times in seconds, lengths in metres, angles in radians.

/**:
  ros__parameters:
    # ────────── insertion success + retry ──────────────────────────────
    insertion_threshold_m: 0.005          # plug-port distance below which insertion is "seated"
    max_insertion_retries: 2              # 1 initial attempt + N retries

    # ────────── descent timing (per plug type) ─────────────────────────
    # min-jerk profile from APPROACH_Z_OFFSET → -INSERTION_DEPTH.
    # Slower descent = more integrator settling time + lower peak velocity.
    # SC's variance lives here, so we keep its descent slow.
    descent_time_sfp: 12.0                # was 9.0 — slowed for cleaner training data
    descent_time_sc: 12.0

    # ────────── approach timing (per plug type) ────────────────────────
    # min-jerk profile from current TCP → pre-hover above port.
    approach_time_sfp: 6.0
    approach_time_sc: 4.0

    # ────────── hover height above port (per plug type) ────────────────
    # SFP needs 20 cm to clear NIC card body.
    # SC ports are board-flush — 12 cm is enough and lets integrator settle less.
    approach_z_offset_sfp: 0.18
    approach_z_offset_sc: 0.12

    # ────────── insertion + settle ─────────────────────────────────────
    insertion_depth: 0.015                # how far below port surface to push
    settle_time_sfp: 1.0                  # post-descent dwell before checking insertion
    settle_time_sc: 2.0
    control_rate_hz: 25.0                 # policy publishes pose_commands at this rate

    # ────────── retry-path timing ──────────────────────────────────────
    lift_time_frac: 0.5                   # lift-back-to-hover takes this fraction of descent_time
    hover_hold_s: 0.5                     # steady-state dwell at hover before retry descent

    # ────────── XY integrator (lateral drift correction) ──────────────
    # During descent, calc_gripper_pose accumulates port-vs-plug XY error
    # into an integrator and shifts the descent target by gain * integrator.
    # Higher gain → faster lateral correction, but risks overshoot/oscillation.
    # Higher windup clamp → more authority to fix large lateral drifts but
    # less safety against runaway integration. Reset between attempts.
    # Each tick, before adding the new error: integrator *= leak. With
    # leak < 1.0, old errors decay so the integrator forgets transients
    # — best lever for damping oscillation. Try 0.92–0.98 if you see
    # the descent zig-zag. leak = 1.0 keeps legacy behaviour.
    xy_integrator_gain: 0.15              # multiplies the clamped integrator
    xy_integrator_max_windup: 0.05        # clip on |integrator|, in metres
    xy_integrator_leak: 1.0               # 1.0 = no leak (legacy); <1.0 damps

    # ────────── stuck-detection (early descent abort) ─────────────────
    # During descent, sample plug-port distance every tick. Once past
    # stuck_min_fraction of the descent, look at the recent stuck_window_s
    # of samples — if net distance change < stuck_progress_m, bail and retry.
    stuck_min_fraction: 0.2
    stuck_window_s: 1.0
    stuck_progress_m: 0.002

    # ────────── deliberate-failure injection (testing only) ────────────
    # Add to port_tf before descent so the policy aims off-target. Real
    # port pose is used for insertion-check, so a nonzero offset
    # reliably fails the first attempt — useful for exercising the
    # retry path. Set to zero for normal operation.
    bad_port_offset_x: 0.0
    bad_port_offset_y: 0.0
    bad_offset_decay_per_retry: 1.0       # 1.0 = no decay; 0.5 = halve each retry

    # ────────── final-release stiffness (anti-jolt) ────────────────────
    # Published before insert_cable returns. aic_controller holds the last
    # tool reference through entity-delete; this hold-current-pose msg
    # keeps the impedance loop compliant during teardown.
    # Match aic_ros2_controllers.yaml defaults so impedance_params_ persists
    # cleanly across deactivate/activate cycles.
    release_stiffness: [75.0, 75.0, 75.0, 75.0, 75.0, 75.0]
    release_damping:   [35.0, 35.0, 35.0, 35.0, 35.0, 35.0]
    release_hold_time: 0.2
